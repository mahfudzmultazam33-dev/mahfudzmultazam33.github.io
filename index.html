<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LKPD Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-600 to-purple-700 min-h-screen">
    <div id="app" class="container mx-auto px-4 py-6 max-w-6xl"></div>

    <script>
        // ========== GANTI URL INI DENGAN URL APPS SCRIPT ANDA ==========
        const API_BASE = 'https://script.google.com/macros/s/AKfycbys2T-tlnBYc-jgtMC3nvW--mxI3p5vDzBe81h50aeOw61PR8rbZAjTnqVOw93iG-jLQQ/exec';
        // ==================================================================
        
        let currentUser = null;
        let allSiswa = [], allTugas = [], allPengumpulan = [];
        
        async function callAPI(action, params = {}) {
            params.action = action;
            if (currentUser?.role === 'guru') params.password = 'guru123';
            
            const url = new URL(API_BASE);
            Object.keys(params).forEach(key => {
                if (params[key]) url.searchParams.append(key, params[key]);
            });
            
            try {
                const res = await fetch(url.toString());
                return await res.json();
            } catch(err) {
                Swal.fire('Error', 'Gagal koneksi ke server', 'error');
                return { error: err.message };
            }
        }
        
        async function render() {
            const app = document.getElementById('app');
            if (!currentUser) {
                app.innerHTML = `<div class="max-w-md mx-auto bg-white rounded-2xl shadow-2xl p-8 mt-20">
                    <div class="text-center mb-8"><div class="text-6xl mb-4">📚</div><h1 class="text-3xl font-bold text-blue-600">LKPD Digital</h1></div>
                    <div class="space-y-4"><button onclick="loginGuru()" class="w-full bg-blue-600 text-white py-3 rounded-xl">👨‍🏫 Guru</button>
                    <button onclick="loginSiswa()" class="w-full bg-green-600 text-white py-3 rounded-xl">👨‍🎓 Siswa</button></div></div>`;
            } else if (currentUser.role === 'guru') {
                await loadGuruData();
                app.innerHTML = renderGuruDashboard();
            } else {
                await loadSiswaData();
                app.innerHTML = renderSiswaDashboard();
            }
            attachEvents();
        }
        
        async function loginGuru() {
            const { value: pwd } = await Swal.fire({ title: 'Login Guru', input: 'password', inputLabel: 'Kode Guru', showCancelButton: true });
            if (pwd === 'guru123') { currentUser = { role: 'guru' }; render(); }
            else if (pwd) Swal.fire('Error', 'Kode salah!', 'error');
        }
        
        async function loginSiswa() {
            const { value: form } = await Swal.fire({
                title: 'Login Siswa',
                html: '<input id="nama" class="swal2-input" placeholder="Nama"><input id="pass" class="swal2-input" type="password" placeholder="Password">',
                preConfirm: () => ({ nama: document.getElementById('nama').value, pass: document.getElementById('pass').value })
            });
            if (form) {
                const res = await callAPI('loginSiswa', { nama: form.nama, password: form.pass });
                if (res.success) { currentUser = { role: 'siswa', ...res.siswa }; render(); }
                else Swal.fire('Gagal', res.error, 'error');
            }
        }
        
        async function loadGuruData() {
            allSiswa = await callAPI('getSiswa');
            allTugas = await callAPI('getTugas');
            allPengumpulan = await callAPI('getPengumpulan');
        }
        
        async function loadSiswaData() {
            allTugas = await callAPI('getTugas');
            allPengumpulan = await callAPI('getPengumpulan', { siswaId: currentUser.id });
        }
        
        function renderGuruDashboard() {
            return `<div class="bg-white rounded-xl shadow-xl"><div class="bg-blue-600 text-white p-5 rounded-t-xl flex justify-between"><h2 class="text-2xl font-bold">Dashboard Guru</h2><button onclick="logout()" class="bg-red-500 px-4 py-2 rounded">Keluar</button></div>
            <div class="p-6"><div class="flex gap-2 border-b mb-5"><button class="tab-btn active px-4 py-2" data-tab="siswa">📋 Siswa</button><button class="tab-btn px-4 py-2" data-tab="tugas">📝 Tugas</button><button class="tab-btn px-4 py-2" data-tab="nilai">✅ Nilai</button></div>
            <div id="tab-siswa" class="tab-content"><div class="flex gap-2 mb-4"><input type="text" id="namaSiswa" placeholder="Nama" class="flex-1 border p-2 rounded"><input type="text" id="kelasSiswa" placeholder="Kelas" class="w-32 border p-2 rounded"><button onclick="tambahSiswa()" class="bg-green-600 text-white px-4 py-2 rounded">Tambah</button></div><div id="siswaList">${renderSiswaList()}</div></div>
            <div id="tab-tugas" class="tab-content hidden"><button onclick="showTugasModal()" class="bg-blue-600 text-white px-4 py-2 rounded mb-4">+ Tugas Baru</button><div id="tugasList">${renderTugasList()}</div></div>
            <div id="tab-nilai" class="tab-content hidden"><div id="nilaiList">${renderNilaiList()}</div></div></div></div>
            ${renderTugasModal()}</div>`;
        }
        
        function renderSiswaList() {
            if (!allSiswa.length) return '<p class="text-gray-500">Belum ada siswa</p>';
            return allSiswa.map(s => `<div class="border p-3 rounded mb-2 flex justify-between"><div><b>${escapeHtml(s.nama)}</b> - ${escapeHtml(s.kelas)}<br><small>Password: ${s.password}</small></div><button onclick="hapusSiswa('${s.id}')" class="text-red-600">Hapus</button></div>`).join('');
        }
        
        function renderTugasList() {
            if (!allTugas.length) return '<p class="text-gray-500">Belum ada tugas</p>';
            return allTugas.map(t => `<div class="border p-4 rounded mb-3"><div class="flex justify-between"><div><h4 class="font-bold">${escapeHtml(t.judul)}</h4><p class="text-sm">${escapeHtml(t.deskripsi)}</p><p class="text-xs text-gray-500">Deadline: ${t.deadline}</p>${t.materi ? `<p class="text-sm mt-1"><b>Materi:</b> ${escapeHtml(t.materi.substring(0,100))}</p>` : ''}</div><div><button onclick="editTugas('${t.id}')" class="text-blue-600 mr-2">Edit</button><button onclick="hapusTugas('${t.id}')" class="text-red-600">Hapus</button>${t.status_selesai !== 'Selesai' ? `<button onclick="selesaikanTugas('${t.id}')" class="text-green-600 ml-2">Selesai</button>` : ''}</div></div></div>`).join('');
        }
        
        function renderNilaiList() {
            if (!allPengumpulan.length) return '<p class="text-gray-500">Belum ada pengumpulan</p>';
            return allPengumpulan.map(p => {
                const siswa = allSiswa.find(s => s.id == p.siswa_id);
                const tugas = allTugas.find(t => t.id == p.tugas_id);
                return `<div class="border p-4 rounded mb-3"><div class="flex justify-between"><div><b>${escapeHtml(siswa?.nama)}</b> - ${escapeHtml(tugas?.judul)}<p class="text-sm bg-gray-100 p-2 rounded mt-2">${escapeHtml(p.jawaban)}</p></div><div class="text-right">${p.status_dinilai === 'Sudah' ? `<span class="text-green-600 font-bold">Nilai: ${p.nilai}</span>` : `<button onclick="beriNilai('${p.id}')" class="bg-yellow-500 text-white px-3 py-1 rounded text-sm">Beri Nilai</button>`}<br>${p.disetujui === 'Ya' ? `<span class="text-green-500">✓ Disetujui</span>` : (p.status_dinilai === 'Sudah' ? `<button onclick="setujuiTugas('${p.id}')" class="bg-blue-500 text-white px-3 py-1 rounded text-sm mt-1">Setujui</button>` : `<span class="text-gray-400">Menunggu</span>`)}</div></div></div>`;
            }).join('');
        }
        
        function renderSiswaDashboard() {
            const tugasAktif = allTugas.filter(t => t.status_selesai !== 'Selesai');
            return `<div class="bg-white rounded-xl shadow-xl"><div class="bg-green-600 text-white p-5 rounded-t-xl flex justify-between"><div><h2 class="text-2xl font-bold">Dashboard Siswa</h2><p>Halo, ${escapeHtml(currentUser.nama)} (${escapeHtml(currentUser.kelas)})</p></div><button onclick="logout()" class="bg-red-500 px-4 py-2 rounded">Keluar</button></div>
            <div class="p-6"><h3 class="font-bold mb-4">📝 Tugas</h3>${tugasAktif.map(t => {
                const sub = allPengumpulan.find(p => p.tugas_id == t.id);
                return `<div class="border p-4 rounded mb-4"><div class="flex justify-between"><div><h4 class="font-bold">${escapeHtml(t.judul)}</h4><p>${escapeHtml(t.deskripsi)}</p>${t.materi ? `<div class="mt-2 p-2 bg-blue-50 rounded"><b>📖 Materi:</b><br>${escapeHtml(t.materi)}</div>` : ''}${t.video_url ? `<div class="mt-2"><b>📹 Video:</b><div class="video-container mt-1"><iframe src="${t.video_url.replace('watch?v=', 'embed/')}" frameborder="0"></iframe></div></div>` : ''}${t.gambar_url ? `<div class="mt-2"><b>🖼️ Gambar:</b><br><img src="${t.gambar_url}" class="max-w-full h-auto rounded"></div>` : ''}<p class="text-xs text-gray-500 mt-2">Deadline: ${t.deadline}</p></div><div class="text-right">${sub ? (sub.disetujui === 'Ya' ? `<span class="text-green-600">✓ Selesai<br>Nilai: ${sub.nilai}</span>` : `<span class="text-yellow-600">⏳ Menunggu</span>`) : `<button onclick="showKumpulModal('${t.id}')" class="bg-green-600 text-white px-4 py-2 rounded">📤 Kumpulkan</button>`}</div></div>${sub?.feedback ? `<div class="text-sm text-gray-500 mt-2">Feedback: ${escapeHtml(sub.feedback)}</div>` : ''}</div>`;
            }).join('')}${tugasAktif.length === 0 ? '<p class="text-gray-500">🎉 Semua tugas selesai!</p>' : ''}</div></div>
            ${renderKumpulModal()}`;
        }
        
        function renderTugasModal() {
            return `<div id="tugasModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50 overflow-auto"><div class="bg-white rounded-xl p-6 w-full max-w-4xl my-8">
                <h3 class="text-xl font-bold mb-4" id="modalTitle">Tugas Baru</h3><input type="hidden" id="editId">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4"><div><label>Judul *</label><input type="text" id="judul" class="w-full border p-2 rounded"></div>
                <div><label>Deadline *</label><input type="date" id="deadline" class="w-full border p-2 rounded"></div></div>
                <div class="mt-3"><label>Deskripsi</label><textarea id="deskripsi" rows="2" class="w-full border p-2 rounded"></textarea></div>
                <div class="mt-3"><label>📖 Materi</label><textarea id="materi" rows="3" class="w-full border p-2 rounded"></textarea></div>
                <div class="mt-3"><label>🎯 Tujuan Pembelajaran</label><textarea id="tujuan" rows="2" class="w-full border p-2 rounded"></textarea></div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-3"><div><label>📹 Video (URL)</label><input type="url" id="videoUrl" class="w-full border p-2 rounded"></div>
                <div><label>🖼️ Gambar (URL)</label><input type="url" id="gambarUrl" class="w-full border p-2 rounded"></div></div>
                <div class="flex justify-end gap-2 mt-6"><button onclick="closeTugasModal()" class="bg-gray-400 px-4 py-2 rounded">Batal</button><button onclick="simpanTugas()" class="bg-blue-600 text-white px-4 py-2 rounded">Simpan</button></div>
            </div></div>`;
        }
        
        function renderKumpulModal() {
            return `<div id="kumpulModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50"><div class="bg-white rounded-xl p-6 w-full max-w-lg">
                <h3 class="text-xl font-bold mb-4">Kumpulkan Tugas</h3><input type="hidden" id="kumpulTugasId">
                <div><label>Jawaban</label><textarea id="jawabanText" rows="4" class="w-full border p-2 rounded"></textarea></div>
                <div class="flex justify-end gap-2 mt-6"><button onclick="closeKumpulModal()" class="bg-gray-400 px-4 py-2 rounded">Batal</button><button onclick="submitKumpul()" class="bg-green-600 text-white px-4 py-2 rounded">Kumpulkan</button></div>
            </div></div>`;
        }
        
        let currentTugasId = null;
        function showKumpulModal(tugasId) { currentTugasId = tugasId; document.getElementById('jawabanText').value = ''; document.getElementById('kumpulModal').classList.remove('hidden'); document.getElementById('kumpulModal').classList.add('flex'); }
        function closeKumpulModal() { document.getElementById('kumpulModal').classList.add('hidden'); document.getElementById('kumpulModal').classList.remove('flex'); }
        
        async function submitKumpul() {
            const jawaban = document.getElementById('jawabanText').value;
            const result = await callAPI('kumpulTugas', { tugas_id: currentTugasId, siswa_id: currentUser.id, jawaban });
            if (result.success) { await loadSiswaData(); render(); closeKumpulModal(); Swal.fire('Berhasil!', 'Tugas dikumpulkan', 'success'); }
        }
        
        async function tambahSiswa() {
            const nama = document.getElementById('namaSiswa')?.value, kelas = document.getElementById('kelasSiswa')?.value;
            if (!nama || !kelas) return Swal.fire('Lengkapi data!');
            await callAPI('addSiswa', { nama, kelas });
            await loadGuruData();
            document.getElementById('siswaList').innerHTML = renderSiswaList();
            document.getElementById('namaSiswa').value = '';
            document.getElementById('kelasSiswa').value = '';
        }
        
        async function hapusSiswa(id) { if (await confirmHapus()) { await callAPI('deleteSiswa', { id }); await loadGuruData(); document.getElementById('siswaList').innerHTML = renderSiswaList(); } }
        
        function showTugasModal(edit = null) {
            document.getElementById('editId').value = ''; document.getElementById('judul').value = ''; document.getElementById('deskripsi').value = '';
            document.getElementById('deadline').value = ''; document.getElementById('materi').value = ''; document.getElementById('tujuan').value = '';
            document.getElementById('videoUrl').value = ''; document.getElementById('gambarUrl').value = ''; document.getElementById('modalTitle').innerText = 'Tugas Baru';
            if (edit) {
                document.getElementById('editId').value = edit.id; document.getElementById('judul').value = edit.judul;
                document.getElementById('deskripsi').value = edit.deskripsi; document.getElementById('deadline').value = edit.deadline;
                document.getElementById('materi').value = edit.materi || ''; document.getElementById('tujuan').value = edit.tujuan_pembelajaran || '';
                document.getElementById('videoUrl').value = edit.video_url || ''; document.getElementById('gambarUrl').value = edit.gambar_url || '';
                document.getElementById('modalTitle').innerText = 'Edit Tugas';
            }
            document.getElementById('tugasModal').classList.remove('hidden'); document.getElementById('tugasModal').classList.add('flex');
        }
        
        function closeTugasModal() { document.getElementById('tugasModal').classList.add('hidden'); document.getElementById('tugasModal').classList.remove('flex'); }
        
        async function simpanTugas() {
            const id = document.getElementById('editId').value, judul = document.getElementById('judul').value, deskripsi = document.getElementById('deskripsi').value;
            const deadline = document.getElementById('deadline').value, materi = document.getElementById('materi').value, tujuan = document.getElementById('tujuan').value;
            const videoUrl = document.getElementById('videoUrl').value, gambarUrl = document.getElementById('gambarUrl').value;
            if (!judul || !deskripsi || !deadline) return Swal.fire('Lengkapi data!');
            if (id) await callAPI('updateTugas', { id, judul, deskripsi, deadline, materi, tujuan_pembelajaran: tujuan, video_url: videoUrl, gambar_url: gambarUrl });
            else await callAPI('addTugas', { judul, deskripsi, deadline, materi, tujuan_pembelajaran: tujuan, video_url: videoUrl, gambar_url: gambarUrl });
            await loadGuruData(); document.getElementById('tugasList').innerHTML = renderTugasList(); closeTugasModal();
        }
        
        async function editTugas(id) { const tugas = allTugas.find(t => t.id == id); if (tugas) showTugasModal(tugas); }
        async function hapusTugas(id) { if (await confirmHapus()) { await callAPI('deleteTugas', { id }); await loadGuruData(); document.getElementById('tugasList').innerHTML = renderTugasList(); } }
        async function selesaikanTugas(tugasId) { await callAPI('selesaikanTugas', { tugasId }); await loadGuruData(); document.getElementById('tugasList').innerHTML = renderTugasList(); }
        async function beriNilai(id) { const { value: form } = await Swal.fire({ title: 'Beri Nilai', html: '<input id="nilai" type="number" placeholder="Nilai"><textarea id="feedback" placeholder="Feedback"></textarea>', preConfirm: () => ({ nilai: document.getElementById('nilai').value, feedback: document.getElementById('feedback').value }) }); if (form && form.nilai) { await callAPI('beriNilai', { submission_id: id, nilai: form.nilai, feedback: form.feedback }); await loadGuruData(); document.getElementById('nilaiList').innerHTML = renderNilaiList(); Swal.fire('Berhasil', 'Nilai disimpan', 'success'); } }
        async function setujuiTugas(id) { await callAPI('setujuiTugas', { submission_id: id }); await loadGuruData(); document.getElementById('nilaiList').innerHTML = renderNilaiList(); Swal.fire('Disetujui!', '', 'success'); }
        function logout() { currentUser = null; render(); }
        function attachEvents() { document.querySelectorAll('.tab-btn').forEach(btn => { btn.onclick = () => { document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden')); document.getElementById(`tab-${btn.dataset.tab}`).classList.remove('hidden'); }; }); }
        function escapeHtml(str) { if (!str) return ''; return String(str).replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
        function confirmHapus() { return Swal.fire({ title: 'Yakin hapus?', icon: 'warning', showCancelButton: true }).then(r => r.isConfirmed); }
        
        render();
    </script>
</body>
</html>
